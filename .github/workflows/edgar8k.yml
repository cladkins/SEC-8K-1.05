name: EDGAR 8-K 1.05 daily scrape

on:
  schedule:
    # Every day at 14:00 UTC (10:00 ET / 09:00 CT) — captures the prior
    # day's filings plus anything filed so far this morning.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Look-back window in days"
        default: "1"
        required: false

permissions:
  contents: write

concurrency:
  group: edgar8k-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute run window
        id: window
        run: |
          DAYS="${{ github.event.inputs.days || '1' }}"
          END=$(date -u +%Y-%m-%d)
          START=$(date -u -d "$END - $DAYS days" +%Y-%m-%d)
          STAMP=$(date -u +%Y-%m-%d)
          echo "days=$DAYS"   >> "$GITHUB_OUTPUT"
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END"     >> "$GITHUB_OUTPUT"
          echo "stamp=$STAMP" >> "$GITHUB_OUTPUT"

      - name: Run scraper
        run: |
          mkdir -p results
          python edgar8k.py \
            --days "${{ steps.window.outputs.days }}" \
            --output "results/${{ steps.window.outputs.stamp }}.csv" \
            --markdown "results/${{ steps.window.outputs.stamp }}.md"
          # Refresh the rolling "latest" copies so the blog can link to a stable path.
          cp "results/${{ steps.window.outputs.stamp }}.csv" "results/latest.csv"
          cp "results/${{ steps.window.outputs.stamp }}.md"  "results/latest.md"

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: edgar8k-${{ steps.window.outputs.stamp }}
          path: results/${{ steps.window.outputs.stamp }}.*
          if-no-files-found: error

      - name: Commit results to main
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "No new results to commit."
            exit 0
          fi
          git commit -m "Daily EDGAR 8-K Item 1.05 scrape ${{ steps.window.outputs.stamp }}"
          git push
